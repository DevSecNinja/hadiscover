---
name: Lint

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    # renovate: datasource=github-tags depName=DevSecNinja/.github
    uses: DevSecNinja/.github/.github/workflows/lint.yml@8487f36bfcc8b040e5541937ba450411f6993e2b # v1.6.1
    permissions:
      contents: read
      security-events: write
    with:
      # renovate: datasource=github-releases depName=jdx/mise
      mise-version: "2026.5.16"
      lint-dprint: false
      lint-yamlfmt: false
      lint-yamllint: false
      lint-checkov: false
      lint-trivy: false
      lint-config-drift: false
