# Production docker-compose configuration using pre-built images from GHCR
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  api:
    image: ghcr.io/devsecninja/hadiscover/backend:0.3.0@sha256:9262b5c2447ecc5963dda5b85e4a7cd6aafea79f06d96ba5ef321b36b8a67d6f
    container_name: api
    ports:
      - "8000:8000"
    environment:
      # Optional: Add your GitHub token for higher API rate limits
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # Optional: Download the pre-built database on start
      # instead of building it from scratch. Set DB_DOWNLOAD_URL
      # to the release asset URL and DISABLE_SCHEDULER=true
      # to skip the in-process hourly indexer.
      # - DB_DOWNLOAD_URL=${DB_DOWNLOAD_URL:-}
      # - DISABLE_SCHEDULER=true
    volumes:
      # Persist database across container restarts
      - api_data:/app/data
    restart: unless-stopped
    healthcheck:
      # Curl not installed in base image
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  web:
    image: ghcr.io/devsecninja/hadiscover/frontend:0.3.0@sha256:1e58712d3c8f8a075991b5341a2d0a2dcb7da124e699b97d7a01cec9632aa4f8
    container_name: web
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      # wget is included in BusyBox on Alpine, no extra dependencies needed
      test:
        ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:80/health.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  api_data:
