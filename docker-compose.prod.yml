# Production docker-compose configuration for the static frontend only.
# The public hadiscover.com deployment is served by GitHub Pages and does not
# require a hadiscover-backend/API container.
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_SEARCH_INDEX_URL: ${NEXT_PUBLIC_SEARCH_INDEX_URL:-https://hadiscover.com/data/search-index.json}
    container_name: web
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      # wget is included in BusyBox on Alpine, no extra dependencies needed
      test:
        ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:80/health.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
