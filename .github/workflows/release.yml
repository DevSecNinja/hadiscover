name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Install backend dependencies
        run: .github/scripts/install-backend-deps.sh

      - name: Run backend tests with coverage
        run: .github/scripts/run-backend-tests.sh

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      version_tag: ${{ steps.get_version.outputs.version_tag }}
      is_prerelease: ${{ steps.check_prerelease.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Get version
        id: get_version
        env:
          EVENT_NAME: ${{ github.event_name }}
          GIT_REF: ${{ github.ref }}
        run: |
          OUTPUT="$(.github/scripts/extract-version.sh "$EVENT_NAME" "" "$GIT_REF")"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"

          # Extract version for validation
          VERSION=$(echo "$OUTPUT" | grep "^version=" | cut -d= -f2)

          # Validate version format
          .github/scripts/validate-version.sh "$VERSION"

      - name: Check if prerelease
        id: check_prerelease
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          OUTPUT="$(.github/scripts/check-if-prerelease.sh "$VERSION" "")"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"

  create-release:
    permissions:
      contents: write
    needs: [test, determine-version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Create GitHub Release
        run: bash .github/scripts/create-github-release.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_TAG: ${{ needs.determine-version.outputs.version_tag }}
          VERSION: ${{ needs.determine-version.outputs.version }}
          IS_PRERELEASE: ${{ needs.determine-version.outputs.is_prerelease }}

  build-pages:
    needs: [create-release, determine-version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Download latest search index
        run: .github/scripts/download-search-index.sh

      - name: Build with Next.js
        working-directory: ./frontend
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ./frontend/out

  deploy-pages:
    permissions:
      pages: write
      id-token: write
    # This job requires manual approval via GitHub environment protection rules
    # Configure the 'production' environment in repository settings to add required reviewers
    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
