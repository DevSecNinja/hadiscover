---
name: Update Database

# Builds the hadiscover SQLite database by running the indexer against GitHub,
# exports static search data for the frontend, deploys GitHub Pages, and
# publishes archival release assets.

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write # create/update db-latest release
  id-token: write # deploy GitHub Pages
  pages: write # deploy GitHub Pages

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-db:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Install backend dependencies
        run: .github/scripts/install-backend-deps.sh

      - name: Run indexing
        working-directory: ./backend
        run: python -m app.cli index-now
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: sqlite:///./data/hadiscover.db

      - name: Export static search data
        working-directory: ./backend
        run: python -m app.cli export-static ../frontend/public/data/search-index.json
        env:
          DATABASE_URL: sqlite:///./data/hadiscover.db

      - name: Compress database
        run: gzip -k backend/data/hadiscover.db

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build static site
        working-directory: ./frontend
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./frontend/out

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Publish data as release assets
        run: .github/scripts/publish-db-release.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
