---
name: Update Database

# Builds the hadiscover SQLite database by running the indexer
# against GitHub and publishes the result as a release asset.
#
# Consumers can bootstrap their backend without a GitHub API
# token by pointing DB_DOWNLOAD_URL at the release asset and
# setting DISABLE_SCHEDULER=true.

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write # create/update db-latest release

jobs:
  update-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: .github/scripts/install-backend-deps.sh

      - name: Run indexing
        working-directory: ./backend
        run: python -m app.cli index-now
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATABASE_URL: sqlite:///./data/hadiscover.db

      - name: Compress database
        run: gzip -k backend/data/hadiscover.db

      - name: Publish database as release asset
        run: .github/scripts/publish-db-release.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
