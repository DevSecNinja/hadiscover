name: Deploy to GitHub Pages (Emergency Only)

# IMPORTANT: This workflow is for EMERGENCY manual deployments only
# Normal deployments happen automatically as part of the release workflow
# which ensures backend changes are coordinated with frontend deployments.
#
# Use this workflow ONLY when:
# - You need to deploy a hotfix outside the normal release cycle
# - The release workflow is broken and you need to deploy immediately
#
# Before running this workflow manually, ensure:
# 1. The latest search data is available in the db-latest release
# 2. Or FRONTEND_SEARCH_INDEX_URL points at an alternate static search index

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: .github/scripts/install-backend-deps.sh

      - name: Run backend tests with coverage
        run: .github/scripts/run-backend-tests.sh

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.2.1

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Download latest search index
        run: .github/scripts/download-search-index.sh
        env:
          SEARCH_INDEX_URL: ${{ vars.FRONTEND_SEARCH_INDEX_URL || format('https://github.com/{0}/releases/download/db-latest/search-index.json', github.repository) }}

      - name: Build with Next.js
        working-directory: ./frontend
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./frontend/out

  deploy:
    permissions:
      pages: write
      id-token: write
    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
